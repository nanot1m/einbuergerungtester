<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Einbuergerung Berlin Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-shape shape-a"></div>
    <div class="background-shape shape-b"></div>

    <main class="app">
      <header class="topbar">
        <div class="topbar-main">
          <div class="progress-row">
            <div class="mini-progress" aria-label="Прогресс изучения">
              <span class="mini-item">К изучению <strong id="due-count">0</strong></span>
              <span class="mini-item">Сегодня <strong id="done-today">0</strong></span>
              <span class="mini-item">Без перевода <strong id="without-translation-count">0</strong></span>
              <span class="mini-item">Стек перевода <strong id="translation-stack-count">0</strong></span>
            </div>
            <button id="reset-progress" class="icon-btn" aria-label="Сбросить прогресс" title="Сбросить прогресс">
              <span aria-hidden="true">↺</span><span>Сброс</span>
            </button>
          </div>
        </div>
      </header>

      <div class="tabs">
        <button id="tab-study" class="tab-btn active" type="button">Тренировка</button>
        <button id="tab-stats" class="tab-btn" type="button">Статистика</button>
        <button id="tab-sim" class="tab-btn" type="button">Симуляция</button>
      </div>

      <div id="study-view">
        <div class="nav-row">
          <button id="back-card" class="back-btn" type="button">&lt; назад</button>
          <span id="card-index" class="nav-index">1 / 310</span>
          <button id="forward-card" class="back-btn" type="button">вперед &gt;</button>
        </div>

        <section id="card" class="card loading">
          <div id="swipe-indicator" class="swipe-indicator hidden"></div>
          <div class="card-meta">
            <span id="card-tag" class="tag">Общие</span>
            <span id="card-group" class="tag group-tag">new</span>
          </div>

          <div class="card-face" id="front-face">
            <p id="question-de" class="question"></p>
            <ol id="quiz-options" class="quiz-options"></ol>
          </div>

          <div class="actions" id="reveal-actions">
            <button id="show-answer" class="primary-btn">Проверить ответ</button>
          </div>

          <div class="actions hidden" id="grade-actions">
            <button class="grade-btn hard" data-grade="hard">Сложно</button>
            <button class="grade-btn easy" data-grade="easy">Легко</button>
          </div>
        </section>

        <section id="empty-state" class="empty hidden">
          <h2>На сегодня карточек нет</h2>
          <p>Вернитесь позже или сбросьте прогресс, чтобы пройти колоду заново.</p>
        </section>
      </div>

      <section id="stats-view" class="stats-view hidden">
        <div id="stats-categories" class="stats-categories"></div>
        <div id="stats-list" class="stats-list"></div>
      </section>

      <section id="sim-view" class="sim-view hidden">
        <div class="sim-top">
          <button id="sim-start" class="back-btn" type="button">Новый тест (33)</button>
          <div class="nav-row">
            <button id="sim-prev" class="back-btn" type="button">&lt; назад</button>
            <span id="sim-progress" class="nav-index">Не начат</span>
            <button id="sim-next" class="back-btn" type="button">вперед &gt;</button>
          </div>
        </div>

        <section id="sim-card" class="card sim-card hidden">
          <div class="card-meta">
            <span id="sim-tag" class="tag">Общие</span>
            <span id="sim-group" class="tag group-tag">new</span>
          </div>
          <div class="card-face">
            <p id="sim-question" class="question"></p>
            <ol id="sim-options" class="quiz-options sim-options"></ol>
          </div>
          <div class="actions">
            <button id="sim-submit" class="primary-btn" type="button">Завершить тест</button>
          </div>
        </section>

      </section>
    </main>

    <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <div class="modal-card">
        <h2 id="confirm-title">Сбросить прогресс?</h2>
        <p>Весь прогресс по карточкам будет удален.</p>
        <div class="modal-actions">
          <button id="cancel-reset" class="modal-btn ghost">Отмена</button>
          <button id="confirm-reset" class="modal-btn danger">Сбросить</button>
        </div>
      </div>
    </div>
    <div id="sim-result-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="sim-result-title">
      <div class="modal-card sim-result-modal-card">
        <div class="modal-actions top">
          <button id="sim-result-close" class="modal-btn ghost" type="button">Закрыть</button>
        </div>
        <div id="sim-result-content"></div>
      </div>
    </div>
    <div id="translation-tooltip" class="translation-tooltip hidden" role="status" aria-live="polite">
      <div class="translation-tooltip-card">
        <button id="translation-tooltip-close" class="translation-tooltip-close" type="button" aria-label="Закрыть перевод">✕</button>
        <div id="translation-tooltip-text" class="translation-tooltip-text"></div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
